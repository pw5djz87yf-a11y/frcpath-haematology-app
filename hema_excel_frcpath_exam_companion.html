            const playChime = (type) => {
                if (isMuted) return;
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    const ctx = new AudioContext();

                    if (type === 'correct') {
                        // High-pitched pleasant ascending arpeggio (C5 -> E5 -> G5)
                        const notes = [523.25, 659.25, 783.99]; 
                        notes.forEach((freq, idx) => {
                            const osc = ctx.createOscillator();
                            const gainNode = ctx.createGain();
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(freq, ctx.currentTime + idx * 0.08);
                            
                            gainNode.gain.setValueAtTime(0, ctx.currentTime);
                            gainNode.gain.linearRampToValueAtTime(0.08, ctx.currentTime + idx * 0.08 + 0.02);
                            gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + idx * 0.08 + 0.35);
                            
                            osc.connect(gainNode);
                            gainNode.connect(ctx.destination);
                            
                            osc.start(ctx.currentTime + idx * 0.08);
                            osc.stop(ctx.currentTime + idx * 0.08 + 0.4);
                        });
                    } else if (type === 'incorrect') {
                        // Descending buzzer sounds (harmonic complexity with triangle & sine)
                        const osc = ctx.createOscillator();
                        const gainNode = ctx.createGain();
                        osc.type = 'triangle';
                        
                        osc.frequency.setValueAtTime(261.63, ctx.currentTime); // C4
                        osc.frequency.linearRampToValueAtTime(146.83, ctx.currentTime + 0.45); // D3 (low slump)
                        
                        gainNode.gain.setValueAtTime(0.12, ctx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
                        
                        osc.connect(gainNode);
                        gainNode.connect(ctx.destination);

                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload)
                        });

                        return data;
                    } catch (error) {
                        attempt++;

                        }
                        const delay = Math.pow(2, attempt - 1) * 1000; // Exponential delays: 1s, 2s, 4s, 8s, 16s

                                                        <span className="text-[10px] font-extrabold uppercase tracking-wider text-slate-455 block mb-1">
                                                            {msg.sender === 'user' ? 'Haematology Registrar' : 'Professor FRCPath'}
                                                        </span>
                                                        <div className="whitespace-pre-wrap">{msg.text}</div>
                                                        
                                                        {/* CITATIONS & SOURCES GROUNDING */}
                                                        {msg.sources && msg.sources.length > 0 && (
                                                            <div className="border-t border-slate-800 pt-2 mt-2 space-y-1">
                                                                <span className="text-[9px] font-bold text-rose-400 uppercase tracking-widest block font-mono">Grounding Sources:</span>
                                                                <div className="flex flex-wrap gap-2 text-[10px]">
                                                                    {msg.sources.map((src, sIdx) => (
                                                                        <a 
                                                                            key={sIdx} 
                                                                            href={src.uri} 
                                                                            target="_blank" 
                                                                            rel="noopener noreferrer" 
                                                                            className="px-2 py-0.5 bg-slate-950 hover:bg-slate-900 text-rose-300 font-semibold rounded border border-slate-800 flex items-center gap-1 transition"
                                                                        >
                                                                            <svg className="w-2.5 h-2.5 text-rose-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                                                            </svg>
                                                                            {src.title}
                                                                        </a>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                            {aiLoading && (
                                                <div className="flex justify-start">
                                                    <div className="bg-slate-900 text-slate-450 p-4 rounded-xl text-xs rounded-tl-none border border-slate-800 flex items-center gap-2">
                                                        <div className="w-2 h-2 rounded-full bg-rose-500 animate-bounce"></div>
                                                        <div className="w-2 h-2 rounded-full bg-rose-500 animate-bounce delay-100"></div>
                                                        <div className="w-2 h-2 rounded-full bg-rose-500 animate-bounce delay-200"></div>
                                                        <span className="font-semibold text-[10px] uppercase ml-1 font-mono">Querying experts & search indexes...</span>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="p-4 border-t border-slate-800/80 bg-slate-950 flex gap-3">
                                            <input 
                                                type="text" 
                                                value={aiQuery}
                                                onChange={(e) => setAiQuery(e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && handleSendChatMessage()}
                                                placeholder="Ask on BSH guidelines (e.g. 'Explain therapeutic-dose anticoagulation in cancer-associated thrombosis with severe thrombocytopenia')...."
                                                className="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-4 text-xs focus:outline-none focus:border-blood-700 text-slate-200 placeholder-slate-600 font-medium"
                                            />
                                            <button 
                                                onClick={handleSendChatMessage}
                                                disabled={!aiQuery.trim() || aiLoading}
                                                className="px-5 py-2.5 bg-rose-700 hover:bg-rose-600 disabled:opacity-50 text-white font-bold text-xs rounded-lg transition uppercase tracking-wider"
                                            >
                                                Consult
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </main>
                    </div>

                    {/* API KEY CONFIGURATION MODAL */}
                    {showKeyModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div className="bg-slate-950 border border-slate-800 rounded-2xl w-full max-w-md p-6 space-y-4 shadow-2xl">
                                <div className="space-y-1">
                                    <h3 className="text-lg font-bold text-white">Configure Gemini API Key</h3>
                                    <p className="text-xs text-slate-400">Configure your personal Google AI key to bypass limits and connect the consult console directly to the live server.</p>
                                </div>

                                <div className="space-y-1.5">
                                    <label className="text-[10px] uppercase tracking-wider font-bold text-slate-400">Gemini Key:</label>
                                    <input 
                                        type="password"
                                        value={customApiKey}
                                        onChange={(e) => setCustomApiKey(e.target.value)}
                                        placeholder="AIzaSy..."
                                        className="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-xs text-slate-200 placeholder-slate-700 focus:outline-none focus:border-blood-700 transition"
                                    />
                                    <span className="text-[9px] text-slate-500">Your key remains entirely in local browser memory and is never stored centrally.</span>
                                </div>

                                <div className="flex justify-end gap-2.5 pt-2">
                                    <button onClick={() => setShowKeyModal(false)} className="px-4 py-2 bg-slate-900 hover:bg-slate-850 border border-slate-800 text-slate-400 font-semibold text-xs rounded-lg transition">
                                        Cancel
                                    </button>
                                    <button onClick={() => setShowKeyModal(false)} className="px-4 py-2 bg-rose-700 hover:bg-rose-600 text-white font-bold text-xs rounded-lg transition">
                                        Save Key
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        // Render React Application
        const rootElement = document.getElementById("root");
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
