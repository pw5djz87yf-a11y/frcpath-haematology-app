name: Update AML question manifest

on:
  push:
    branches:
      - main
    paths:
      - "frcpath_gs_aml_*.json"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-aml-question-manifest
  cancel-in-progress: true

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate manifest
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          filenames = sorted(
              (path.name for path in Path(".").glob("frcpath_gs_aml_*.json")),
              key=str.casefold,
          )
          Path("aml-question-bank-manifest.json").write_text(
              json.dumps(filenames, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Commit updated manifest
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aml-question-bank-manifest.json
          if git diff --cached --quiet; then
            echo "Manifest is already current."
            exit 0
          fi
          git commit -m "Update AML question bank manifest"
          git push
