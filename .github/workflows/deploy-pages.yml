name: Deploy app to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "auth-sync.js"
      - "supabase-config.js"
      - "aml-question-bank-manifest.json"
      - "frcpath_gs_aml_*.json"
      - "scripts/export_release.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and validate site
        run: python scripts/export_release.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/frcpath-haematology-release

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
